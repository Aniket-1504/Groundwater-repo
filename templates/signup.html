<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

.error{
color:#d8000c;
margin-top:10px;
}

.success{
color:#0f7a2f;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<form method="POST">

<input name="username" placeholder="Username" required>

<input name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Signup</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}
{% if success %}
<p class="success">{{ success }}</p>
{% endif %}

<br>

<a href="/login">Already have account?</a>

</div>

</body>
</html>
