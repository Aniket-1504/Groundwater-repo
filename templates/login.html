<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>DWLR Groundwater Monitoring Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* Background */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
background-size:cover;
overflow:hidden;
}

/* Floating bubbles animation */

.bubble{
position:absolute;
bottom:-100px;
background:rgba(255,255,255,0.2);
border-radius:50%;
animation:rise 15s infinite ease-in;
}

.bubble:nth-child(1){width:40px;height:40px;left:10%;animation-duration:12s;}
.bubble:nth-child(2){width:25px;height:25px;left:30%;animation-duration:10s;}
.bubble:nth-child(3){width:60px;height:60px;left:55%;animation-duration:14s;}
.bubble:nth-child(4){width:20px;height:20px;left:75%;animation-duration:9s;}
.bubble:nth-child(5){width:50px;height:50px;left:90%;animation-duration:13s;}

@keyframes rise{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

/* Login Card */

.login-box{
width:380px;
padding:40px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
color:white;
}

/* Title */

.logo{
font-size:32px;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
margin-bottom:25px;
opacity:0.9;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
font-size:14px;
}

input::placeholder{
color:#eee;
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#00c6ff;
background:linear-gradient(to right,#0072ff,#00c6ff);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px #00c6ff;
}

/* Signup link */

.signup{
margin-top:15px;
font-size:14px;
}

.signup a{
color:#00e5ff;
text-decoration:none;
font-weight:bold;
}

.signup a:hover{
text-decoration:underline;
}

/* Error */

.error{
color:#ff8080;
margin-top:10px;
}

</style>

</head>

<body>

<!-- Floating bubbles -->
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="login-box">

<div class="logo">💧 DWLR</div>

<div class="subtitle">
Groundwater Monitoring & Water Quality Prediction System
</div>

<form method="POST">

<input name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="signup">
Don't have an account?  
<a href="/signup">Create Account</a>
</div>

{% if error %}
<p class="error">{{error}}</p>
{% endif %}

</div>

</body>
</html>
