<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Monitoring Map</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#001f2d,#0d1117);
    color:#e6edf3;
    padding-top:90px;
}

.page-title{
    text-align:center;
    margin:18px 0;
    font-weight:700;
    background:linear-gradient(90deg,#00ffff,#00ff9d);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.page-wrap{
    max-width:1300px;
    margin:auto;
    padding:0 18px 25px;
}

.map-layout{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:16px;
}

.card-box{
    background:rgba(255,255,255,0.05);
    border-radius:14px;
    padding:15px;
    border:1px solid rgba(255,255,255,0.10);
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
}

#map{
    height:540px;
    border-radius:12px;
}

.field{
    margin-bottom:8px;
    color:#bcd0e1;
    font-size:14px;
}

.field b{
    color:#fff;
}

.chat-messages{
    height:360px;
    overflow-y:auto;
    padding:10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.18);
    margin-bottom:10px;
}

.msg{
    padding:8px 10px;
    border-radius:8px;
    margin:8px 0;
    font-size:14px;
}

.msg-user{
    background:rgba(0,255,255,0.18);
    margin-left:auto;
}

.msg-bot{
    background:rgba(255,255,255,0.08);
}

.chat-row{
    display:flex;
    gap:8px;
}

.chat-row input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#161b22;
    color:white;
}

.chat-row button{
    border:none;
    padding:10px 16px;
    border-radius:8px;
    font-weight:700;
    background:linear-gradient(90deg,#00ffff,#00ff9d);
    color:black;
}

.quality-legend{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:10px;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
}

.legend-dot{
    width:10px;
    height:10px;
    border-radius:50%;
}

.excellent{background:#00ff9d;}
.good{background:#eaff00;}
.poor{background:#ff8c00;}
.unfit{background:#ff0033;}

@media(max-width:992px){
    .map-layout{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

{% include "navbar.html" %}

<h2 class="page-title">🏞️ River Water Monitoring Map</h2>

<div class="page-wrap">
<div class="map-layout">

    <!-- Map -->
    <div class="card-box">
        <div id="map"></div>
    </div>

    <!-- Right Panel -->
    <div class="card-box">

        <h4>Selected Water Body</h4>

        <div id="selectedInfo">
            <p class="field">
                Showing <b>all districts</b>. Click any marker for details.
            </p>

            <div class="quality-legend">
                <div class="legend-item"><span class="legend-dot excellent"></span>Excellent</div>
                <div class="legend-item"><span class="legend-dot good"></span>Good</div>
                <div class="legend-item"><span class="legend-dot poor"></span>Poor</div>
                <div class="legend-item"><span class="legend-dot unfit"></span>Unfit</div>
            </div>
        </div>

        <hr>

        <h4>Water Chatbot</h4>

        <div class="chat-messages" id="chatMessages">
            <div class="msg msg-bot">
                Ask: best district, worst district, average depth district, or district name.
            </div>
        </div>

        <div class="chat-row">
            <input type="text" id="chatInput" placeholder="Ask question...">
            <button id="chatSend">Send</button>
        </div>

    </div>

</div>
</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* Map */
var map = L.map('map').setView([19.5,75.3],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

/* Load Data */
fetch("/map-data")
.then(res => res.json())
.then(result => {

    let points = Array.isArray(result.data) ? result.data : [];
    let filtered = points;   // all districts default

    function markerColor(q){
        q = (q || "").toLowerCase();

        if(q==="excellent") return "#00ff9d";
        if(q==="good") return "#eaff00";
        if(q==="poor") return "#ff8c00";
        if(q==="unfit") return "#ff0033";

        return "#4a90e2";
    }

    if(filtered.length > 0){
        let avgLat = filtered.reduce((sum,p)=>sum + p.lat,0)/filtered.length;
        let avgLng = filtered.reduce((sum,p)=>sum + p.lng,0)/filtered.length;

        map.setView([avgLat,avgLng],7);
    }

    filtered.forEach(point => {

        let marker = L.circleMarker([point.lat, point.lng],{
            radius:7,
            color:markerColor(point.quality),
            fillOpacity:0.85
        }).addTo(map);

        marker.bindPopup(`
            <b>Water Body:</b> ${point.water_body || "N/A"}<br>
            <b>Station:</b> ${point.station}<br>
            <b>District:</b> ${point.district}<br>
            <b>pH:</b> ${point.ph}<br>
            <b>DO:</b> ${point.dissolved_o2}<br>
            <b>BOD:</b> ${point.bod}<br>
            <b>Nitrate:</b> ${point.nitrate_n}<br>
            <b>Depth:</b> ${point.depth} m<br>
            <b>WQI:</b> ${point.wqi}<br>
            <b>Quality:</b> ${point.quality}
        `);

        marker.on("click", function(){

            document.getElementById("selectedInfo").innerHTML = `
                <p class="field"><b>Water Body:</b> ${point.water_body || "N/A"}</p>
                <p class="field"><b>Station:</b> ${point.station}</p>
                <p class="field"><b>District:</b> ${point.district}</p>
                <p class="field"><b>Depth:</b> ${point.depth} m</p>
                <p class="field"><b>Quality:</b> ${point.quality}</p>
                <p class="field"><b>WQI:</b> ${point.wqi}</p>
            `;
        });

    });

});

/* Chat */
function addChatMessage(text,sender){

    let box = document.getElementById("chatMessages");

    let div = document.createElement("div");
    div.className = "msg " + (sender==="user" ? "msg-user":"msg-bot");
    div.textContent = text;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function sendChat(){

    let input = document.getElementById("chatInput");
    let msg = input.value.trim();

    if(!msg) return;

    addChatMessage(msg,"user");
    input.value = "";

    fetch("/chatbot-query",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:msg
        })
    })
    .then(res=>res.json())
    .then(data=>{
        addChatMessage(data.reply || "No reply","bot");
    })
    .catch(()=>{
        addChatMessage("Error contacting chatbot.","bot");
    });
}

document.getElementById("chatSend").addEventListener("click",sendChat);

document.getElementById("chatInput").addEventListener("keydown",function(e){
    if(e.key==="Enter"){
        e.preventDefault();
        sendChat();
    }
});

</script>

</body>
</html>
