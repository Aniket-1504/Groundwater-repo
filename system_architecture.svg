<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="greyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2410c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.15" />
    </filter>
    
    <!-- Marker for Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#fafafa" />

  <!-- TITLE -->
  <text x="500" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">Water Quality &amp; Groundwater Prediction System</text>
  <text x="500" y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#64748b">SYSTEM ARCHITECTURE SCHEMATIC</text>

  <!-- ================= LAYERS ================= -->

  <!-- 1. DATA ACQUISITION & INGESTION LAYER -->
  <g transform="translate(30, 95)" filter="url(#dropShadow)">
    <rect width="200" height="520" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <rect width="200" height="40" rx="12" fill="url(#blueGrad)" />
    <!-- Round bottom corners fix -->
    <rect y="25" width="200" height="15" fill="url(#blueGrad)" />
    <text x="100" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">1. Data Ingestion Layer</text>
    
    <!-- CSV Block -->
    <g transform="translate(15, 60)">
      <rect width="170" height="100" rx="8" fill="url(#greyGrad)" stroke="#cbd5e1" stroke-width="1" />
      <text x="85" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Raw Dataset Ingestion</text>
      <text x="85" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">NWMP July-Sept CSVs</text>
      <text x="85" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">categorical depths</text>
      <path d="M 30 75 L 140 75" stroke="#cbd5e1" stroke-width="1" />
      <text x="85" y="88" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0284c7" font-weight="600">Admin CSV Uploader</text>
    </g>

    <!-- Preprocessing Block -->
    <g transform="translate(15, 175)">
      <rect width="170" height="145" rx="8" fill="url(#greyGrad)" stroke="#cbd5e1" stroke-width="1" />
      <text x="85" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Preprocessing Pipeline</text>
      <rect x="15" y="35" width="140" height="20" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Null Imputation (Median/Mode)</text>
      
      <rect x="15" y="60" width="140" height="20" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="73" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Outlier Clipping (1%-99%)</text>

      <rect x="15" y="85" width="140" height="20" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="98" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Depth Interval Mapping</text>

      <rect x="15" y="110" width="140" height="24" rx="4" fill="#eff6ff" stroke="#bfdbfe" />
      <text x="85" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">groundwater_cleaned.csv</text>
    </g>

    <!-- SQLite Block -->
    <g transform="translate(15, 335)">
      <rect width="170" height="70" rx="8" fill="url(#greyGrad)" stroke="#cbd5e1" stroke-width="1" />
      <text x="85" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Relational Storage</text>
      <text x="85" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569">users.db (SQLite)</text>
      <text x="85" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Creds &amp; Hashed Passwords</text>
    </g>
  </g>

  <!-- 2. MACHINE LEARNING & MODEL LAYER -->
  <g transform="translate(270, 95)" filter="url(#dropShadow)">
    <rect width="200" height="520" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <rect width="200" height="40" rx="12" fill="url(#blueGrad)" />
    <rect y="25" width="200" height="15" fill="url(#blueGrad)" />
    <text x="100" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2. Predictive ML Layer</text>

    <!-- RF Framework -->
    <g transform="translate(15, 60)">
      <rect width="170" height="75" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" />
      <text x="85" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">Random Forest Regressor</text>
      <text x="85" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#2563eb">Estimators = 100-200</text>
      <text x="85" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#2563eb">Split = 80/20 train/test</text>
    </g>

    <!-- Model Files -->
    <g transform="translate(15, 150)">
      <rect width="170" height="255" rx="8" fill="url(#greyGrad)" stroke="#cbd5e1" stroke-width="1" />
      <text x="85" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Trained Models (.pkl)</text>
      
      <!-- pkl list -->
      <rect x="15" y="38" width="140" height="22" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">ph_model.pkl</text>

      <rect x="15" y="66" width="140" height="22" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">dissolved_o2_model.pkl</text>

      <rect x="15" y="94" width="140" height="22" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="108" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">bod_model.pkl</text>

      <rect x="15" y="122" width="140" height="22" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="136" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">nitrate_n_model.pkl</text>

      <rect x="15" y="150" width="140" height="22" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="164" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">approx_depth_model.pkl</text>
      
      <path d="M 30 185 L 140 185" stroke="#cbd5e1" stroke-width="1" />
      <text x="85" y="202" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Dynamic Auto-Retraining</text>
      <text x="85" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8">triggers on admin upload</text>
    </g>
  </g>

  <!-- 3. FLASK BACKEND & CONTROLLER LAYER -->
  <g transform="translate(510, 95)" filter="url(#dropShadow)">
    <rect width="220" height="520" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <rect width="220" height="40" rx="12" fill="url(#blueGrad)" />
    <rect y="25" width="220" height="15" fill="url(#blueGrad)" />
    <text x="110" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">3. Flask Backend Layer</text>

    <!-- app.py Core Router -->
    <g transform="translate(15, 60)">
      <rect width="190" height="345" rx="8" fill="url(#greyGrad)" stroke="#cbd5e1" stroke-width="1" />
      <text x="95" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#0f172a">Server Engine (app.py)</text>
      
      <!-- Inside features -->
      <rect x="15" y="35" width="160" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" />
      <text x="95" y="47" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#334155">WQI Calculator Engine</text>
      <text x="95" y="59" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Weighted Sub-Index Scoring</text>

      <rect x="15" y="75" width="160" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" />
      <text x="95" y="87" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#334155">Local Feature XAI Engine</text>
      <text x="95" y="99" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Correlation &amp; Deviations</text>

      <rect x="15" y="115" width="160" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" />
      <text x="95" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#334155">Agricultural Crop Advisory</text>
      <text x="95" y="139" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Crop Planning &amp; Suitability</text>

      <rect x="15" y="155" width="160" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" />
      <text x="95" y="167" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#334155">Weather Adapt Heuristics</text>
      <text x="95" y="179" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Converts Weather -> Features</text>
      
      <rect x="15" y="195" width="160" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" />
      <text x="95" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#334155">Threshold Alert Manager</text>
      <text x="95" y="219" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Threshold Check &amp; Cooldown</text>
      
      <rect x="15" y="235" width="160" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" />
      <text x="95" y="247" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#334155">NLP Voice/Chat Assistants</text>
      <text x="95" y="259" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Regex &amp; Rule-Based Intent Parser</text>
      
      <rect x="15" y="275" width="160" height="32" rx="4" fill="#ffffff" stroke="#cbd5e1" />
      <text x="95" y="287" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#334155">ReportLab PDF Compiler</text>
      <text x="95" y="299" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Generates Printable PDF Reports</text>
    </g>

    <!-- External Gateways -->
    <g transform="translate(15, 415)">
      <rect width="190" height="90" rx="8" fill="url(#orangeGrad)" opacity="0.1" />
      <rect width="190" height="90" rx="8" fill="none" stroke="#ea580c" stroke-width="1" />
      <text x="95" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#c2410c">External API / SMTP Gateways</text>
      
      <rect x="15" y="32" width="160" height="20" rx="4" fill="#ffffff" stroke="#fdba74" />
      <text x="95" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#c2410c">Open-Meteo REST API (Weather)</text>

      <rect x="15" y="58" width="160" height="20" rx="4" fill="#ffffff" stroke="#fdba74" />
      <text x="95" y="71" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#c2410c">SMTP Server (Gmail Alert Relay)</text>
    </g>
  </g>

  <!-- 4. UI / PRESENTATION LAYER -->
  <g transform="translate(765, 95)" filter="url(#dropShadow)">
    <rect width="200" height="520" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <rect width="200" height="40" rx="12" fill="url(#blueGrad)" />
    <rect y="25" width="200" height="15" fill="url(#blueGrad)" />
    <text x="100" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">4. UI / Presentation Layer</text>

    <!-- Frontend Pages -->
    <g transform="translate(15, 60)">
      <rect width="170" height="255" rx="8" fill="url(#greyGrad)" stroke="#cbd5e1" stroke-width="1" />
      <text x="85" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Responsive Dashboards</text>
      
      <rect x="12" y="38" width="146" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="53" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">Main Dashboard (index.html)</text>

      <rect x="12" y="68" width="146" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="83" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">Realtime GW (realtime_gw.html)</text>

      <rect x="12" y="98" width="146" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="113" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">Location Trends (location.html)</text>

      <rect x="12" y="128" width="146" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="143" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">District Summary (district.html)</text>

      <rect x="12" y="158" width="146" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="173" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">Leaflet Geographical Map</text>

      <rect x="12" y="188" width="146" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="203" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">Chatbot (chatbot.html)</text>

      <rect x="12" y="218" width="146" height="24" rx="4" fill="#ffffff" stroke="#e2e8f0" />
      <text x="85" y="233" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155">Admin Panel (upload.html)</text>
    </g>

    <!-- Interactive Elements -->
    <g transform="translate(15, 325)">
      <rect width="170" height="180" rx="8" fill="url(#greenGrad)" opacity="0.1" />
      <rect width="170" height="180" rx="8" fill="none" stroke="#10b981" stroke-width="1" />
      <text x="85" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#047857">Interactive UI Engines</text>
      
      <rect x="15" y="38" width="140" height="24" rx="4" fill="#ffffff" stroke="#a7f3d0" />
      <text x="85" y="53" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#047857">Chart.js Rendering (canvas)</text>

      <rect x="15" y="68" width="140" height="24" rx="4" fill="#ffffff" stroke="#a7f3d0" />
      <text x="85" y="83" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#047857">Leaflet.js Map Visuals</text>

      <rect x="15" y="98" width="140" height="24" rx="4" fill="#ffffff" stroke="#a7f3d0" />
      <text x="85" y="113" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#047857">Web Speech Recognition API</text>

      <rect x="15" y="128" width="140" height="36" rx="4" fill="#ecfdf5" stroke="#6ee7b7" />
      <text x="85" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="bold" fill="#065f46">Dynamic Jinja2 Template</text>
      <text x="85" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#047857">Injects Flask Context to UI</text>
    </g>
  </g>

  <!-- ================= FLOW ARROWS / CONNECTORS ================= -->
  
  <!-- Ingestion to Modeling (Arrow 1) -->
  <line x1="230" y1="210" x2="270" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="230" y1="470" x2="250" y2="470" stroke="#64748b" stroke-width="2" />
  <line x1="250" y1="470" x2="250" y2="295" stroke="#64748b" stroke-width="2" />
  <line x1="250" y1="295" x2="270" y2="295" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Modeling to Controller (Arrow 2) -->
  <line x1="470" y1="310" x2="510" y2="310" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Controller to UI (Arrow 3) -->
  <line x1="730" y1="260" x2="765" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Backflows (User actions / Admin updates / DB updates) -->
  <!-- UI query to controller -->
  <path d="M 765 290 L 747 290 L 747 380 L 730 380" fill="none" stroke="#94a3b8" stroke-dasharray="3 3" stroke-width="1.5" marker-end="url(#arrow)" />
  
  <!-- Controller database write -->
  <path d="M 510 395 L 490 395 L 490 510 L 230 510" fill="none" stroke="#94a3b8" stroke-dasharray="3 3" stroke-width="1.5" marker-end="url(#arrow)" />
</svg>
